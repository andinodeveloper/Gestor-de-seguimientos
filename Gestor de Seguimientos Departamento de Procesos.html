<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gestión - Súper Selectos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --selectos-green: #00843D;
            --selectos-light: #f3fbf7;
        }

        .bg-selectos-green {
            background-color: var(--selectos-green);
        }

        .text-selectos-green {
            color: var(--selectos-green);
        }

        .border-selectos-green {
            border-color: var(--selectos-green);
        }

        .hover-bg-selectos-green:hover {
            background-color: #006b32;
        }

        .kanban-column {
            min-height: 120px;
        }

        .drag-over {
            border: 2px dashed var(--selectos-green);
            background-color: var(--selectos-light);
        }

        .input-corp {
            border-bottom: 2px solid #e5e7eb;
            transition: border-color 0.3s;
        }

        .input-corp:focus {
            border-color: var(--selectos-green);
            outline: none;
        }

        .save-indicator {
            font-size: 10px;
            color: #10b981;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .save-indicator.show {
            opacity: 1;
        }

        .kanban-task-textarea {
            width: 100%;
            min-height: 40px;
            resize: none;
            overflow: hidden;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 11px;
            line-height: 1.4;
            border: none;
            background: transparent;
            outline: none;
        }

        .obs-truncate,
        .text-truncate {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .tooltip-container {
            position: relative;
            display: block;
            cursor: pointer;
        }

        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #064e3b;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            white-space: pre-wrap;
            max-width: 300px;
            z-index: 10000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            word-break: break-all;
            border: 1px solid #065f46;
        }

        .tooltip-text::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #064e3b;
        }

        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            animation: modalFadeIn 0.2s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .modal-textarea:focus {
            outline: none;
            border-color: var(--selectos-green);
        }

        .sticky-nav {
            position: sticky;
            top: 76px;
            z-index: 40;
            background: var(--selectos-green);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-link {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.8);
            padding: 14px 20px;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-link.active {
            color: white;
            border-bottom-color: white;
            background: rgba(255, 255, 255, 0.15);
        }

        .drop-indicator {
            border-top: 3px solid var(--selectos-green) !important;
            margin-top: 4px !important;
            background-color: var(--selectos-light) !important;
        }

        .priority-critica,
        .priority-crítica {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .priority-alta {
            background-color: #ffedd5;
            color: #9a3412;
        }

        .priority-media {
            background-color: #fef9c3;
            color: #854d0e;
        }

        .priority-baja {
            background-color: #f0fdf4;
            color: #166534;
        }

        .status-completado {
            background-color: #dcfce7;
            color: #166534;
        }

        .status-proceso,
        .status-enproceso {
            background-color: #dbeafe;
            color: #1e40af;
        }

        .status-pendiente {
            background-color: #f3f4f6;
            color: #374151;
        }

        .project-nav-item {
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .project-nav-item:hover {
            background-color: #f9fafb;
            border-left-color: var(--selectos-green);
        }
    </style>
</head>

<body class="bg-gray-50 font-sans text-gray-900">
    <nav class="bg-white border-b-4 border-selectos-green p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="Logo Super Selectos.png" alt="Logo Súper Selectos" class="h-10 w-auto object-contain">
                <div>
                    <h1 class="text-xl font-black text-gray-800 tracking-tight">PORTAL DE GESTIÓN</h1>
                    <div class="flex items-center gap-2">
                        <p class="text-[10px] uppercase font-bold text-gray-400">Excelencia y Control</p>
                        <span id="save-msg" class="save-indicator font-bold italic"><i
                                class="fa-solid fa-cloud-arrow-up"></i> Cambios guardados</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="exportProjectZip(true)"
                    class="bg-gray-800 hover:bg-black text-white px-4 py-2 rounded-full text-[10px] font-bold shadow transition-all flex items-center gap-2"><i
                        class="fa-solid fa-lock"></i> Exportar ZIP (Solo Lectura)</button>
                <button onclick="exportProjectZip(false)"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full text-[10px] font-bold shadow transition-all flex items-center gap-2"><i
                        class="fa-solid fa-file-zipper"></i> Guardar Proyecto (.zip)</button>
                <button onclick="document.getElementById('import-file').click()"
                    class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-[10px] font-bold shadow transition-all flex items-center gap-2"><i
                        class="fa-solid fa-file-import"></i> Cargar Proyecto</button>
                <input type="file" id="import-file" style="display: none;" onchange="importProject(this)">
                <button onclick="resetData()"
                    class="text-gray-400 hover:text-red-500 text-[10px] font-bold uppercase mr-4">Limpiar Todo</button>
                <button onclick="generatePPTX()"
                    class="bg-selectos-green hover-bg-selectos-green text-white px-6 py-2 rounded-full font-bold shadow-lg transition-all flex items-center gap-2"><i
                        class="fa-solid fa-file-powerpoint"></i> Descargar Presentación Pro</button>
            </div>
        </div>
    </nav>

    <div class="sticky-nav">
        <div class="container mx-auto flex justify-center gap-8">
            <a href="#section-docs" class="nav-link">Documentos</a>
            <a href="#section-matrix" class="nav-link">Actividades</a>
            <a href="#section-projects" class="nav-link">Proyectos</a>
        </div>
    </div>

    <main class="container mx-auto p-6 space-y-8">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 grid md:grid-cols-3 gap-6">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-400 uppercase">Unidad Organizativa</label>
                <input type="text" id="area-name" oninput="saveAllData()"
                    class="w-full text-lg font-bold text-gray-800 input-corp bg-transparent">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-400 uppercase">Responsable</label>
                <input type="text" id="presenter-name" oninput="saveAllData()"
                    class="w-full text-lg font-bold text-gray-800 input-corp bg-transparent">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-400 uppercase">Fecha de Reporte</label>
                <input type="date" id="report-date" oninput="saveAllData()"
                    class="w-full text-lg font-bold text-gray-800 input-corp bg-transparent">
            </div>
        </div>

        <div id="section-docs"
            class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200 scroll-mt-32">
            <div class="bg-gray-900 p-4 flex justify-between items-center text-white">
                <h2 class="font-bold uppercase tracking-widest text-xs flex items-center gap-2"><i
                        class="fa-solid fa-file-contract text-selectos-green"></i> Estado de Elaboración de Documentos
                </h2>
                <button onclick="addRegDoc()"
                    class="bg-selectos-green hover:bg-green-700 px-4 py-1 rounded text-[10px] font-bold transition">+
                    DOCUMENTO</button>
            </div>
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-[10px] uppercase">
                    <tr>
                        <th class="p-4 text-left">Documento</th>
                        <th class="p-4 text-left">Estado</th>
                        <th class="p-4 text-left w-64">Avance</th>
                        <th class="p-4 text-left">Observaciones</th>
                        <th class="p-4"></th>
                    </tr>
                </thead>
                <tbody id="reg-docs-body"></tbody>
            </table>
        </div>

        <div id="section-matrix"
            class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200 scroll-mt-32">
            <div class="bg-gray-900 p-4 flex justify-between items-center text-white">
                <h2 class="font-bold uppercase tracking-widest text-xs flex items-center gap-2"><i
                        class="fa-solid fa-calendar-check text-selectos-green"></i> Matriz de Actividades Diarias</h2>
                <button onclick="addActivity()"
                    class="bg-selectos-green hover:bg-green-700 px-4 py-1 rounded text-[10px] font-bold transition">+
                    ACTIVIDAD</button>
            </div>
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-500 text-[10px] uppercase">
                    <tr>
                        <th class="p-4 text-left">Descripción</th>
                        <th class="p-4 text-left">Frecuencia</th>
                        <th class="p-4 text-left">Prioridad</th>
                        <th class="p-4 text-left">Estado</th>
                        <th class="p-4 text-left">Observaciones</th>
                        <th class="p-4"></th>
                    </tr>
                </thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>

        <div id="section-projects" class="space-y-6 scroll-mt-32">
            <div class="bg-white p-4 rounded-xl shadow border border-gray-200 sticky top-[120px] z-30">
                <h3 class="text-[10px] font-black text-gray-400 uppercase mb-3 flex items-center gap-2"><i
                        class="fa-solid fa-layer-group text-selectos-green"></i> Navegador de Proyectos</h3>
                <div id="project-navigator" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="projects-list" class="space-y-6"></div>
        </div>
        <button onclick="addProject()"
            class="w-full p-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-400 font-bold hover:bg-gray-50 transition uppercase text-xs">+
            Añadir Nuevo Tablero de Proyecto</button>
    </main>

    <div id="obs-modal" class="modal-overlay" style="display: none;"
        onclick="if(event.target === this) closeObsModal()">
        <div class="modal-content">
            <h3 class="text-lg font-bold text-gray-800 mb-2">Editar Información</h3>
            <textarea id="obs-modal-textarea" class="modal-textarea" placeholder="Escriba aquí..."></textarea>
            <div class="flex justify-end gap-3 mt-4">
                <button onclick="closeObsModal()"
                    class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 font-bold">Cancelar</button>
                <button id="modal-save-btn" onclick="saveObsModal()"
                    class="px-4 py-2 bg-selectos-green text-white rounded font-bold hover:bg-green-700">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const REG_STATUS_MASTER = [
            { label: "0.1. IDENTIFICACIÓN O SOLICITUD FORMAL", val: 0, color: "bg-gray-400" },
            { label: "0.2. REVISIÓN Y VALIDACIÓN DEL REQUERIMIENTO", val: 4, color: "bg-gray-400" },
            { label: "0.3. ASIGNACIÓN A ANALISTA RESPONSABLE", val: 7, color: "bg-gray-400" },
            { label: "0.4. PRIORIZACIÓN Y CALENDARIZACIÓN", val: 10, color: "bg-gray-400" },
            { label: "1.1. CONTACTO INICIAL CON ÁREA", val: 13, color: "bg-orange-400" },
            { label: "1.2. REVISIÓN NORMATIVA Y DOCUMENTAL", val: 17, color: "bg-orange-400" },
            { label: "1.3. LEVANTAMIENTO DE INFORMACIÓN", val: 25, color: "bg-orange-500" },
            { label: "1.4. ANÁLISIS Y ESTRUCTURA DOCUMENTAL", val: 30, color: "bg-orange-500" },
            { label: "2.1. CREACIÓN DE ESTRUCTURA BASE", val: 35, color: "bg-blue-400" },
            { label: "2.2. REDACCIÓN DE CONTENIDO PRINCIPAL", val: 45, color: "bg-blue-400" },
            { label: "2.3. REDACCIÓN DE ANEXOS Y TABLAS", val: 50, color: "bg-blue-500" },
            { label: "2.4. REVISIÓN INTERNA DEL ANALISTA", val: 55, color: "bg-blue-500" },
            { label: "2.5. PREVALIDACIÓN CON LÍDER", val: 60, color: "bg-blue-600" },
            { label: "3.1. REVISIÓN POR ÁREAS INVOLUCRADAS", val: 65, color: "bg-yellow-400" },
            { label: "3.2. AJUSTES E INCORPORACIÓN DE COMENTARIOS", val: 70, color: "bg-yellow-400" },
            { label: "3.3. VALIDACIÓN POR REVISORES FORMALES", val: 75, color: "bg-yellow-500" },
            { label: "3.4. VALIDACIÓN POR ÁREA DE PROCESOS", val: 80, color: "bg-yellow-500" },
            { label: "4.1. APROBACIÓN DEL DOCUMENTO", val: 85, color: "bg-green-400" },
            { label: "4.2. REGISTRO Y CODIFICACIÓN DEFINITIVA", val: 90, color: "bg-green-400" },
            { label: "4.3. PUBLICACIÓN Y NOTIFICACIÓN OFICIAL", val: 95, color: "bg-green-500" },
            { label: "5.1. ARCHIVO DEL EXPEDIENTE", val: 97, color: "bg-green-600" },
            { label: "5.2. ACTUALIZACIÓN DE MATRIZ MAESTRA", val: 99, color: "bg-green-700" },
            { label: "5.3. CIERRE Y SEGUIMIENTO", val: 100, color: "bg-green-800" }
        ];

        let regDocs = [], activities = [], projects = [];

        function saveAllData() {
            const data = { area: document.getElementById('area-name').value, presenter: document.getElementById('presenter-name').value, date: document.getElementById('report-date').value, regDocs, activities, projects };
            localStorage.setItem('selectos_v5_data', JSON.stringify(data));
            const msg = document.getElementById('save-msg'); msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 1500);
        }

        function loadAllData() {
            const saved = localStorage.getItem('selectos_v5_data');
            if (saved) {
                const p = JSON.parse(saved);
                document.getElementById('area-name').value = p.area || "";
                document.getElementById('presenter-name').value = p.presenter || "";
                document.getElementById('report-date').value = p.date || "";
                regDocs = p.regDocs || []; activities = p.activities || []; projects = p.projects || [];
            }
            renderAll();
        }

        function resetData() { if (confirm("¿Limpiar todo?")) { localStorage.removeItem('selectos_v5_data'); location.reload(); } }

        function renderRegDocs() {
            const body = document.getElementById('reg-docs-body'); body.innerHTML = '';
            regDocs.forEach((d, i) => {
                const cur = REG_STATUS_MASTER[d.statusIdx];
                body.innerHTML += `<tr class="border-b hover:bg-green-50/30">
                    <td class="p-4"><div class="tooltip-container" onclick="openTextModal('regDocs', ${i}, 'name')"><span class="text-truncate font-bold">${d.name || 'Haga clic...'}</span><span class="tooltip-text">${d.name}</span></div></td>
                    <td class="p-4"><select onchange="updateRegDoc(${i},'statusIdx',this.value)" class="text-[10px] font-bold border rounded p-1 w-full">${REG_STATUS_MASTER.map((opt, idx) => `<option value="${idx}" ${d.statusIdx == idx ? 'selected' : ''}>${opt.label}</option>`).join('')}</select></td>
                    <td class="p-4"><div class="flex items-center gap-2"><div class="flex-grow bg-gray-200 h-2 rounded-full overflow-hidden"><div class="h-full ${cur.color}" style="width:${cur.val}%"></div></div><span class="text-[10px] font-bold w-8">${cur.val}%</span></div></td>
                    <td class="p-4"><div class="tooltip-container" onclick="openObsModal('regDocs', ${i})"><span class="obs-truncate italic text-xs text-gray-400">${d.obs || 'Haga clic...'}</span><span class="tooltip-text">${d.obs}</span></div></td>
                    <td class="p-4 text-center"><button onclick="deleteRegDoc(${i})" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button></td>
                </tr>`;
            });
        }

        function renderMatrix() {
            const body = document.getElementById('matrix-body'); body.innerHTML = '';
            activities.forEach((act, i) => {
                const pClass = `priority-${act.priority.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")}`;
                const sClass = `status-${act.status.toLowerCase().replace(/\s/g, '')}`;
                body.innerHTML += `<tr class="border-b hover:bg-green-50/30">
                    <td class="p-4 font-medium"><div class="tooltip-container" onclick="openTextModal('activities', ${i}, 'name')"><span class="text-truncate">${act.name || 'Haga clic...'}</span><span class="tooltip-text">${act.name}</span></div></td>
                    <td class="p-4"><select onchange="updateAct(${i},'freq',this.value)" class="bg-white border rounded text-xs p-1 w-full">${["Diaria", "Semanal", "Quincenal", "Mensual"].map(f => `<option value="${f}" ${act.freq == f ? 'selected' : ''}>${f}</option>`).join('')}</select></td>
                    <td class="p-4"><select onchange="updateAct(${i},'priority',this.value)" class="text-[10px] font-bold border rounded p-1 w-full ${pClass}">${["Baja", "Media", "Alta", "Crítica"].map(p => `<option value="${p}" ${act.priority == p ? 'selected' : ''}>${p}</option>`).join('')}</select></td>
                    <td class="p-4"><select onchange="updateAct(${i},'status',this.value)" class="bg-white border rounded text-xs p-1 w-full ${sClass}">${["Pendiente", "En Proceso", "Completado"].map(s => `<option value="${s}" ${act.status == s ? 'selected' : ''}>${s}</option>`).join('')}</select></td>
                    <td class="p-4"><div class="tooltip-container" onclick="openObsModal('activities', ${i})"><span class="obs-truncate italic text-xs text-gray-400">${act.obs || 'Haga clic...'}</span><span class="tooltip-text">${act.obs}</span></div></td>
                    <td class="p-4 text-center"><button onclick="deleteAct(${i})" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button></td>
                </tr>`;
            });
        }

        function renderProjects() {
            const container = document.getElementById('projects-list'); const nav = document.getElementById('project-navigator');
            container.innerHTML = ''; nav.innerHTML = '';
            projects.forEach(p => {
                nav.innerHTML += `<a href="#project-${p.id}" class="project-nav-item bg-gray-100 px-3 py-1 rounded text-[10px] font-bold text-gray-600 hover:text-selectos-green">${p.name}</a>`;
                const div = document.createElement('div'); div.id = `project-${p.id}`; div.className = "bg-white rounded-xl shadow border border-gray-200 overflow-hidden scroll-mt-48";
                div.innerHTML = `<div class="bg-gray-900 p-3 flex justify-between items-center text-white"><input type="text" value="${p.name}" onchange="updateProjectName(${p.id},this.value)" class="bg-transparent font-bold text-xs uppercase outline-none focus:text-selectos-green w-1/2"><button onclick="deleteProject(${p.id})" class="text-gray-500 hover:text-red-400 text-[10px] uppercase font-bold">Quitar Proyecto</button></div>
                    <div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-4">${renderCol(p, 'todo', 'Pendientes', 'border-gray-300')}${renderCol(p, 'doing', 'En Desarrollo', 'border-green-400')}${renderCol(p, 'done', 'Finalizados', 'border-green-700')}</div>`;
                container.appendChild(div);
            });
        }

        function renderCol(p, colKey, label, border) {
            return `<div class="bg-gray-50 p-3 rounded-lg border-t-4 ${border}"><h4 class="text-[9px] font-black text-gray-400 mb-3 uppercase tracking-widest">${label}</h4>
                <div class="kanban-column space-y-2" ondrop="drop(event, ${p.id}, '${colKey}')" ondragover="allowDrop(event)" ondragleave="clearDrop(event)">
                    ${p.tasks[colKey].map((t, i) => {
                const isReadOnly = (new URLSearchParams(window.location.search)).get('readonly') === 'true' || window.isReadOnlyMode;
                return `<div class="bg-white p-2 rounded shadow-sm border text-[11px] flex justify-between items-start group ${isReadOnly ? '' : 'cursor-move'}" draggable="${!isReadOnly}" ondragstart="${isReadOnly ? 'return false;' : `drag(event, ${p.id}, '${colKey}', ${i})`}" ondragover="dragOverTask(event, this, ${i})" ondragleave="dragLeaveTask(this)">
                            <span class="text-[9px] font-bold text-gray-300 mr-2 mt-1">${i + 1}.</span>
                            <textarea class="kanban-task-textarea flex-grow pr-2" ${isReadOnly ? 'disabled' : ''} oninput="autoResizeTask(this); updateTask(${p.id}, '${colKey}', ${i}, this.value)">${t}</textarea>
                            ${isReadOnly ? '' : `<button onclick="deleteTask(${p.id}, '${colKey}', ${i})" class="text-gray-200 group-hover:text-red-400 flex-shrink-0"><i class="fa-solid fa-trash-can"></i></button>`}
                        </div>`;
            }).join('')}
                </div><button onclick="addTask(${p.id}, '${colKey}')" class="w-full mt-3 py-1 text-[9px] font-bold text-gray-300 hover:text-selectos-green border border-dashed border-gray-300 rounded uppercase">+ Tarea</button></div>`;
        }

        function addRegDoc() { regDocs.push({ id: Date.now(), name: "Nuevo Documento", statusIdx: 0, obs: "" }); renderRegDocs(); saveAllData(); }
        function updateRegDoc(i, f, v) { regDocs[i][f] = f === 'statusIdx' ? parseInt(v) : v; renderRegDocs(); saveAllData(); }
        function deleteRegDoc(i) { regDocs.splice(i, 1); renderRegDocs(); saveAllData(); }
        function addActivity() { activities.push({ id: Date.now(), name: "Nueva Actividad", freq: "Diaria", priority: "Media", status: "Pendiente", obs: "" }); renderMatrix(); saveAllData(); }
        function updateAct(i, f, v) { activities[i][f] = v; renderMatrix(); saveAllData(); }
        function deleteAct(i) { activities.splice(i, 1); renderMatrix(); saveAllData(); }
        function addProject() { projects.push({ id: Date.now(), name: "PROYECTO NUEVO", tasks: { todo: [], doing: [], done: [] } }); renderProjects(); saveAllData(); }
        function deleteProject(id) { projects = projects.filter(p => p.id !== id); renderProjects(); saveAllData(); }
        function updateProjectName(id, v) { projects.find(p => p.id == id).name = v; renderProjects(); }
        function addTask(id, col) { projects.find(p => p.id == id).tasks[col].push("Nueva tarea..."); renderProjects(); saveAllData(); }
        function updateTask(id, col, idx, v) { projects.find(p => p.id == id).tasks[col][idx] = v; saveAllData(); }
        function deleteTask(id, col, idx) { projects.find(p => p.id == id).tasks[col].splice(idx, 1); renderProjects(); saveAllData(); }

        let dragged = null, draggedOverIdx = null;
        function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function clearDrop(e) { e.currentTarget.classList.remove('drag-over'); }
        function drag(e, pid, col, idx) { dragged = { pid, col, idx }; }
        function dragOverTask(e, el, idx) {
            e.preventDefault();
            draggedOverIdx = idx;
            if (!el.classList.contains('drop-indicator')) {
                el.classList.add('drop-indicator');
            }
        }
        function dragLeaveTask(el) {
            el.classList.remove('drop-indicator');
        }
        function drop(e, pid, col) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            document.querySelectorAll('.drop-indicator').forEach(el => el.classList.remove('drop-indicator'));
            if (dragged.pid == pid) {
                const p = projects.find(x => x.id == pid);
                const t = p.tasks[dragged.col].splice(dragged.idx, 1)[0];
                if (draggedOverIdx !== null) p.tasks[col].splice(draggedOverIdx, 0, t);
                else p.tasks[col].push(t);
                draggedOverIdx = null; renderProjects(); saveAllData();
            }
        }

        function generatePPTX() {
            const pptx = new PptxGenJS();
            const area = document.getElementById('area-name').value;
            const user = document.getElementById('presenter-name').value;
            const dateStr = document.getElementById('report-date').value;
            const THEME_GREEN = "00843D", THEME_DARK = "1a1a1a";

            // Helper to define Master Slides with specific titles
            function defineMaster(name, titleText) {
                pptx.defineSlideMaster({
                    title: name,
                    background: { color: "FFFFFF" },
                    objects: [
                        { rect: { x: 0, y: 0, w: "100%", h: 0.1, fill: { color: THEME_GREEN } } },
                        { text: { text: titleText, options: { x: 0.5, y: 0.4, w: 9, h: 0.5, fontSize: 22, bold: true, color: THEME_GREEN } } },
                        { rect: { x: 0, y: 7.2, w: "100%", h: 0.3, fill: { color: "F1F5F9" } } },
                        { text: { text: "Súper Selectos - Departamento de Procesos", options: { x: 0.5, y: 7.25, w: 5, fontSize: 8, color: "64748B" } } },
                        { text: { text: `${area} | ${dateStr}`, options: { x: 5.5, y: 7.25, w: 3.5, align: "right", fontSize: 8, color: "64748B" } } },
                        { text: { text: "Pág. {{slide_number}}", options: { x: 9.2, y: 7.25, w: 0.5, align: "right", fontSize: 8, color: "64748B" } } }
                    ]
                });
            }

            defineMaster("MASTER_DOCS", "📋 ESTADO DE ELABORACIÓN DE DOCUMENTOS");
            defineMaster("MASTER_ACTIVITIES", "📊 MATRIZ DE ACTIVIDADES OPERATIVAS");
            defineMaster("MASTER_PROJECTS", "🎯 AVANCE DE PROYECTOS");
            defineMaster("MASTER_GENERIC", "💡 INFORMACIÓN COMPLEMENTARIA");

            const tableStyle = { x: 0.5, y: 1.2, w: 9, fontSize: 10, border: { pt: 0.5, color: "E2E8F0" }, autoPage: true, autoPageRepeatHeader: true, autoPageHeaderRows: 1, newSlideStartY: 1.2 };
            const headerStyle = { fill: THEME_GREEN, color: "FFFFFF", bold: true, align: "center" };

            // 1. Portada
            let s1 = pptx.addSlide();
            s1.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: '100%', h: 0.15, fill: { color: THEME_GREEN } });
            s1.addText(area.toUpperCase(), { x: 0.5, y: 2.2, w: 9, fontSize: 24, bold: true, color: THEME_GREEN });
            s1.addText("Informe de Gestión", { x: 0.5, y: 2.8, w: 9, fontSize: 38, bold: true, color: THEME_DARK });
            s1.addText(user.toUpperCase(), { x: 0.5, y: 5.2, w: 9, fontSize: 14, bold: true, color: THEME_DARK });
            s1.addText(dateStr, { x: 0.5, y: 5.6, w: 9, fontSize: 12, color: "666666" });

            // 2. Tabla Regulatoria
            let s2 = pptx.addSlide({ masterName: "MASTER_DOCS" });
            let regData = [[{ text: "DOCUMENTO", options: headerStyle }, { text: "ESTADO", options: headerStyle }, { text: "AVANCE", options: headerStyle }, { text: "OBSERVACIONES", options: headerStyle }]];
            regDocs.forEach((d, i) => {
                const s = REG_STATUS_MASTER[d.statusIdx]; const bg = i % 2 === 0 ? "FFFFFF" : "F9FAFB";
                regData.push([{ text: d.name, options: { fill: bg } }, { text: s.label, options: { fill: bg, align: "center" } }, { text: s.val + "%", options: { fill: bg, align: "center", bold: true, color: THEME_GREEN } }, { text: d.obs, options: { fill: bg, italic: true, fontSize: 9 } }]);
            });
            s2.addTable(regData, tableStyle);

            // 3. Matriz Actividades
            let s3 = pptx.addSlide({ masterName: "MASTER_ACTIVITIES" });
            let actData = [[{ text: "ACTIVIDAD", options: headerStyle }, { text: "FREC.", options: headerStyle }, { text: "PRIORIDAD", options: headerStyle }, { text: "ESTATUS", options: headerStyle }, { text: "OBSERVACIONES", options: headerStyle }]];
            activities.forEach((a, i) => {
                const bg = i % 2 === 0 ? "FFFFFF" : "F9FAFB";
                actData.push([{ text: a.name, options: { fill: bg } }, { text: a.freq, options: { fill: bg } }, { text: a.priority, options: { fill: bg } }, { text: a.status, options: { fill: bg } }, { text: a.obs, options: { fill: bg, italic: true, fontSize: 8 } }]);
            });
            s3.addTable(actData, tableStyle);

            // 4. Kanban Slides
            projects.forEach(p => {
                let sk = pptx.addSlide({ masterName: "MASTER_PROJECTS" });
                sk.addText(`PROYECTO: ${p.name.toUpperCase()}`, { x: 0.5, y: 0.8, w: 9, fontSize: 14, bold: true, color: THEME_DARK });
                const kCols = [{ t: "POR HACER", k: 'todo', c: "64748B", x: 0.4 }, { t: "EJECUCIÓN", k: 'doing', c: THEME_GREEN, x: 3.45 }, { t: "FINALIZADO", k: 'done', c: "064E3B", x: 6.5 }];
                kCols.forEach(col => {
                    sk.addShape(pptx.ShapeType.rect, { x: col.x, y: 1.2, w: 2.9, h: 0.4, fill: { color: col.c } });
                    sk.addText(col.t, { x: col.x, y: 1.2, w: 2.9, h: 0.4, color: "FFFFFF", align: "center", bold: true, fontSize: 10 });
                    if (p.tasks[col.k].length > 0) {
                        let rows = p.tasks[col.k].map((t, i) => [{ text: `${i + 1}. ${t}`, options: { fill: "F9FAFB", fontSize: 8, margin: 4, border: { pt: 0.5, color: "CBD5E1" } } }]);
                        sk.addTable(rows, { x: col.x, y: 1.65, w: 2.9, rowH: 0.35, valign: "middle" });
                    }
                });
            });

            // 5. Template Slides
            let sComp = pptx.addSlide({ masterName: "MASTER_GENERIC" });
            sComp.addText("Puntos Clave / Notas Adicionales:", { x: 0.5, y: 1.2, fontSize: 16, bold: true, color: THEME_DARK });
            sComp.addText("• [Insertar punto importante]\n• [Insertar detalle relevante]\n• [Insertar observación final]", { x: 0.5, y: 1.7, w: 9, fontSize: 12, color: "333333" });

            let sNext = pptx.addSlide({ masterName: "MASTER_GENERIC" });
            sNext.addText("PRÓXIMOS PASOS Y COMPROMISOS", { x: 0.5, y: 0.4, w: 9, h: 0.5, fontSize: 22, bold: true, color: THEME_GREEN });
            let nextData = [[{ text: "ACCIÓN", options: headerStyle }, { text: "RESPONSABLE", options: headerStyle }, { text: "FECHA", options: headerStyle }]];
            nextData.push(["[Acción 1]", "[Responsable]", "[Fecha]"], ["[Acción 2]", "[Responsable]", "[Fecha]"]);
            sNext.addTable(nextData, { x: 0.5, y: 1.2, w: 9, border: { pt: 0.5, color: "E2E8F0" } });

            // Filename logic: yymmdd + Departamento de Procesos-Reporte-Nombre
            const now = new Date();
            const yymmdd = now.toISOString().slice(2, 10).replace(/-/g, '');
            const fileName = `${yymmdd} Departamento de Procesos-Reporte-${user || 'Responsable'}.pptx`;
            pptx.writeFile({ fileName });
        }

        let currentEdit = null;
        function openObsModal(type, index) { openModal(type, index, 'obs', 'Editar Observación'); }
        function openTextModal(type, index, field) { openModal(type, index, field, 'Editar Texto'); }
        function openModal(type, index, field, title) {
            currentEdit = { type, index, field }; const modal = document.getElementById('obs-modal');
            const textarea = document.getElementById('obs-modal-textarea'); modal.querySelector('h3').innerText = title;
            textarea.value = (type === 'regDocs' ? regDocs[index][field] : activities[index][field]) || '';
            modal.style.display = 'flex'; textarea.focus();
        }
        function closeObsModal() { document.getElementById('obs-modal').style.display = 'none'; currentEdit = null; }
        function saveObsModal() {
            if (!currentEdit) return; const val = document.getElementById('obs-modal-textarea').value;
            if (currentEdit.type === 'regDocs') updateRegDoc(currentEdit.index, currentEdit.field, val);
            else updateAct(currentEdit.index, currentEdit.field, val);
            closeObsModal();
        }

        function autoResizeTask(textarea) { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; }
        function initializeTextareas() { setTimeout(() => { document.querySelectorAll('.kanban-task-textarea').forEach(autoResizeTask); }, 100); }
        function renderAll() { renderRegDocs(); renderMatrix(); renderProjects(); initializeTextareas(); checkReadOnly(); }

        async function exportProjectZip(isReadOnly) {
            const zip = new JSZip(); const data = { area: document.getElementById('area-name').value, presenter: document.getElementById('presenter-name').value, date: document.getElementById('report-date').value, regDocs, activities, projects };
            let html = document.documentElement.outerHTML; if (isReadOnly) html = html.replace('<head>', '<head><script>window.isReadOnlyMode = true;<\/script>');
            zip.file("index.html", html); zip.file("data.json", JSON.stringify(data, null, 4));
            try { const resp = await fetch('Logo Super Selectos.png'); if (resp.ok) zip.file("Logo Super Selectos.png", await resp.blob()); } catch (e) { }
            saveAs(await zip.generateAsync({ type: "blob" }), isReadOnly ? "Portal_SoloLectura.zip" : "Proyecto_Editable.zip");
        }

        function importProject(input) {
            const reader = new FileReader(); reader.onload = (e) => {
                try {
                    const d = JSON.parse(e.target.result); document.getElementById('area-name').value = d.area || ""; document.getElementById('presenter-name').value = d.presenter || ""; document.getElementById('report-date').value = d.date || "";
                    regDocs = d.regDocs || []; activities = d.activities || []; projects = d.projects || []; renderAll(); saveAllData(); alert("Éxito");
                } catch (err) { alert("Error"); }
            }; reader.readAsText(input.files[0]);
        }

        function checkReadOnly() {
            const isReadOnly = (new URLSearchParams(window.location.search)).get('readonly') === 'true' || window.isReadOnlyMode;
            if (isReadOnly) {
                document.querySelectorAll('button').forEach(b => { if (!b.innerText.includes('PowerPoint') && !b.innerText.includes('ZIP') && !b.innerText.includes('Cargar')) b.style.display = 'none'; });
                document.querySelectorAll('input, select, textarea').forEach(el => { if (el.id !== 'import-file') { el.disabled = true; el.style.pointerEvents = 'none'; } });
            }
        }

        window.addEventListener('scroll', () => {
            const sections = ['section-docs', 'section-matrix', 'section-projects']; let curr = "";
            sections.forEach(s => { const el = document.getElementById(s); if (el && el.getBoundingClientRect().top <= 150) curr = s; });
            document.querySelectorAll('.nav-link').forEach(l => { l.classList.remove('active'); if (l.getAttribute('href') === `#${curr}`) l.classList.add('active'); });
        });
        window.onload = loadAllData;
    </script>
</body>
